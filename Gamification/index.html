<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenBowl | Catch the Protein</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            /* ZenBowl Green */
            --accent: #e67e22;
            /* ZenBowl Orange */
            --dark: #2d3436;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            /* Prevents scrolling while playing */
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 8px solid white;
        }

        canvas {
            display: block;
            background: #ffffff;
            cursor: none;
        }

        /* Overlay Styles (Start/Win screens) */
        .overlay {
            position: absolute;
            inset: 0;
            background: var(--glass);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        h1 {
            color: var(--dark);
            margin-bottom: 10px;
        }

        p {
            color: #636e72;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        #score-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--glass);
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            pointer-events: none;
        }

        .voucher-code {
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--primary);
            background: #eafaf1;
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px dashed var(--primary);
            margin: 20px 0;
        }

        /* Add this to the end of your <style> block */

        #poster-preview {
            width: 60%;
            /* Adjust size as needed for mobile */
            max-width: 200px;
            /* Prevents it from being too big on desktops */
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            /* Pushes the title down */
            border: 3px solid white;
            /* Adds a nice "sticker" border */
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div id="score-badge">Score: <span id="score">0</span> / 10</div>

        <div id="start-screen" class="overlay">
            <img src="ZENBOWL POSTER.png" id="poster-preview" alt="ZenBowl Poster Preview">

            <h1>ZenBowl Catch 🥗</h1>
            <p>Catch the falling proteins to fuel your day and unlock a special reward!</p>
            <button class="btn" onclick="startGame()">Start Game</button>
        </div>

        <div id="win-screen" class="overlay" style="display: none;">
            <div style="font-size: 50px;">🥗</div>
            <h1>Fuel Achieved! ⚡</h1>
            <p>You've earned your ZenBowl reward:</p>
            <div class="voucher-code">ZENPRO20</div>

            <a href="https://forms.gle/twptBSEfsKxrmETL7" target="_blank" style="text-decoration: none; width: 80%;">
                <button class="btn" style="width: 100%; margin-bottom: 12px;">Checkout & Order Now</button>
            </a>

            <button class="btn" onclick="location.reload()"
                style="background: transparent; color: var(--dark); box-shadow: none; border: 1px solid #ccc; padding: 10px 24px;">
                Play Again
            </button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const container = document.getElementById('game-container');

        canvas.width = 450;
        canvas.height = window.innerHeight * 0.9;

        let score = 0;
        let gameRunning = false;
        let bowl = { x: 185, y: canvas.height - 100, w: 80, h: 45 };
        let items = [];
        const proteins = ['🍗', '🥚', '🍤', '🥜', '🫘', '🥦', '🥑', '🍄', '🌱'];


        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            spawnItem();
            draw();
        }

        function spawnItem() {
            if (!gameRunning) return;
            items.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: -50,
                emoji: proteins[Math.floor(Math.random() * proteins.length)],
                speed: 4 + Math.random() * 3
            });
            setTimeout(spawnItem, 800);
        }

        function draw() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Bowl with rounded corners
            ctx.fillStyle = '#e67e22';
            // Replace the old bowl drawing section in the draw() function with this:
            function drawBowl(x, y, w, h) {
                ctx.save();

                // Create a subtle gradient for depth
                let gradient = ctx.createLinearGradient(x, y, x, y + h);
                gradient.addColorStop(0, '#e67e22'); // Top (Light Zen Orange)
                gradient.addColorStop(1, '#d35400'); // Bottom (Darker Orange)

                ctx.fillStyle = gradient;
                ctx.beginPath();

                // The top flat edge
                ctx.moveTo(x, y);
                ctx.lineTo(x + w, y);

                // The curved bottom (the bowl shape)
                // We use a quadratic curve to make it look like a half-circle/bowl
                ctx.quadraticCurveTo(x + w, y + h, x + w / 2, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y);

                ctx.closePath();
                ctx.fill();

                // Add a "rim" to the bowl for a premium look
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x - 2, y);
                ctx.lineTo(x + w + 2, y);
                ctx.stroke();

                ctx.restore();
            }

            // Inside your draw() function, replace:
            // roundRect(ctx, bowl.x, bowl.y, bowl.w, bowl.h, 10, true);
            // WITH:
            drawBowl(bowl.x, bowl.y, bowl.w, bowl.h);

            items.forEach((item, index) => {
                item.y += item.speed;
                ctx.font = "35px Arial";
                ctx.fillText(item.emoji, item.x, item.y);

                // Collision Detection
                if (item.y > bowl.y && item.y < bowl.y + bowl.h &&
                    item.x > bowl.x && item.x < bowl.x + bowl.w) {
                    items.splice(index, 1);
                    score++;
                    scoreEl.innerText = score;
                    if (score >= 10) winGame();
                }

                if (item.y > canvas.height) items.splice(index, 1);
            });

            requestAnimationFrame(draw);
        }

        function winGame() {
            gameRunning = false;
            document.getElementById('win-screen').style.display = 'flex';
        }

        // Helper for rounded bowl
        function roundRect(ctx, x, y, width, height, radius, fill) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height);
            ctx.lineTo(x, y + height);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            if (fill) ctx.fill();
        }

        // Interaction
        const handleMove = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            bowl.x = clientX - rect.left - bowl.w / 2;
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
    </script>
</body>

</html>
